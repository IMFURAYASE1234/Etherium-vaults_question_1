# Hybrid mode: Prometheus in Docker, exporter running locally on host
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Points to the locally running exporter (npm start in monitoring/exporter)
  - job_name: 'vault-exporter'
    static_configs:
      - targets: ['host.docker.internal:3001']
    scrape_interval: 10s
    metrics_path: /metrics
